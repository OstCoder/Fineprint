<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="magClip">
      <circle cx="27" cy="27" r="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#0a0a0a" rx="12"/>

  <!-- Document lines -->
  <rect x="12" y="10" width="28" height="2.5" rx="1.25" fill="#333"/>
  <rect x="12" y="15" width="24" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="12" y="20" width="26" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="12" y="25" width="20" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="12" y="30" width="25" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="12" y="35" width="22" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="12" y="40" width="27" height="2" rx="1" fill="#2a2a2a"/>
  <rect x="12" y="45" width="18" height="2" rx="1" fill="#2a2a2a"/>

  <!-- Zoomed lines inside lens -->
  <g clip-path="url(#magClip)">
    <rect x="13" y="22" width="28" height="4" rx="2" fill="#e8d5a3" opacity="0.95"/>
    <rect x="13" y="29" width="22" height="4" rx="2" fill="#e8d5a3" opacity="0.65"/>
    <rect x="13" y="36" width="25" height="4" rx="2" fill="#e8d5a3" opacity="0.65"/>
  </g>

  <!-- Magnifying glass ring -->
  <circle cx="27" cy="27" r="17" fill="none" stroke="#e8d5a3" stroke-width="2.5"/>

  <!-- Handle -->
  <line x1="40" y1="40" x2="52" y2="54" stroke="#e8d5a3" stroke-width="3" stroke-linecap="round"/>
</svg>

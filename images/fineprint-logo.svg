<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Courier+Prime&amp;display=swap');
    </style>
    <!-- Paper texture pattern -->
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0a0a0a"/>
      <circle cx="1" cy="1" r="0.4" fill="#1a1a1a" opacity="0.6"/>
      <circle cx="3" cy="3" r="0.3" fill="#1a1a1a" opacity="0.4"/>
    </pattern>

    <!-- Magnifying glass clip -->
    <clipPath id="magClip">
      <circle cx="32" cy="52" r="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="140" fill="url(#grain)" rx="8"/>

  <!-- Icon: Magnifying glass over tiny text lines -->
  <g transform="translate(18, 18)">
    <!-- Tiny "fine print" lines (document) -->
    <rect x="10" y="20" width="44" height="3" rx="1.5" fill="#333" opacity="0.9"/>
    <rect x="10" y="27" width="38" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="33" width="42" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="39" width="30" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="45" width="40" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="51" width="34" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="57" width="44" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="63" width="28" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="69" width="38" height="2" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="75" width="42" height="2" rx="1" fill="#333" opacity="0.7"/>

    <!-- Magnifying glass lens -->
    <circle cx="32" cy="50" r="24" fill="none" stroke="#e8d5a3" stroke-width="3"/>
    <circle cx="32" cy="50" r="23" fill="#e8d5a3" opacity="0.07"/>

    <!-- Zoomed-in text inside lens (highlighted) -->
    <g clip-path="url(#magClip)">
      <rect x="14" y="44" width="36" height="4" rx="2" fill="#e8d5a3" opacity="0.9"/>
      <rect x="14" y="51" width="28" height="4" rx="2" fill="#e8d5a3" opacity="0.6"/>
      <rect x="14" y="58" width="32" height="4" rx="2" fill="#e8d5a3" opacity="0.6"/>
    </g>

    <!-- Magnifying glass handle -->
    <line x1="50" y1="68" x2="62" y2="82" stroke="#e8d5a3" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text
    x="108"
    y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1"
    fill="#f5f0e8"
  >fineprint</text>

  <!-- Tagline -->
  <text
    x="110"
    y="98"
    font-family="'Courier New', Courier, monospace"
    font-size="11.5"
    letter-spacing="3.5"
    fill="#e8d5a3"
    opacity="0.75"
  >READ BETWEEN THE LINES</text>

  <!-- Subtle underline accent -->
  <line x1="108" y1="104" x2="358" y2="104" stroke="#e8d5a3" stroke-width="0.75" opacity="0.3"/>
</svg>

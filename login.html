<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fineprint — Login</title>
<link rel="icon" type="image/svg+xml" href="images/fineprint-favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Courier+Prime&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Courier Prime', monospace;
  background: #25100C;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-image: radial-gradient(ellipse at 50% 50%, #392314 0%, #25100C 60%, #0a0806 100%);
}

.card {
  background: #392314;
  border: 1px solid #764C34;
  padding: 40px 36px;
  border-radius: 12px;
  width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  color: #F4E3B0;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -1px;
}

.tagline {
  text-align: center;
  font-size: 11px;
  color: #B9B9B7;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.tabs {
  display: flex;
  background: rgba(0,0,0,0.3);
  border-radius: 6px;
  padding: 3px;
  margin-bottom: 22px;
}

.tab {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: 4px;
  font-family: 'Courier Prime', monospace;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: rgba(244,227,176,0.4);
  letter-spacing: 1px;
}

.tab.active {
  background: #764C34;
  color: #F4E3B0;
}

input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #764C34;
  font-size: 14px;
  font-family: 'Courier Prime', monospace;
  background: rgba(0,0,0,0.4);
  color: #F4E3B0;
  transition: border 0.2s;
}

input::placeholder { color: #B9B9B7; opacity: 0.6; }
input:focus { outline: none; border-color: #F4E3B0; }

.submit-btn {
  width: 100%;
  padding: 13px;
  margin-top: 14px;
  background: #764C34;
  color: #F4E3B0;
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
}

.submit-btn:hover { background: #8a5a3e; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.message {
  margin-top: 14px;
  font-size: 12px;
  border-radius: 4px;
  padding: 8px 10px;
  display: none;
  text-align: center;
  letter-spacing: 0.5px;
}
.message.error   { display: block; background: rgba(255,80,80,0.1); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.2); }
.message.success { display: block; background: rgba(107,255,184,0.1); color: #6bffb8; border: 1px solid rgba(107,255,184,0.2); }

.form-panel.hidden { display: none; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">fineprint</div>
  <div class="tagline">Read between the lines</div>

  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="switchTab('login')">Log In</button>
    <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div class="form-panel" id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button class="submit-btn" id="loginBtn" onclick="logIn()">Log In</button>
  </div>

  <div class="form-panel hidden" id="signupForm">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Password (min. 6 characters)">
    <input type="password" id="signupConfirm" placeholder="Confirm Password">
    <button class="submit-btn" id="signupBtn" onclick="signUp()">Create Account</button>
  </div>

  <div class="message" id="message"></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  const client = supabaseClient;

  if (!client) {
    setTimeout(() => {
      setMsg("Missing Supabase config. Define window.FINEPRINT_CONFIG before login.", "error");
      document.getElementById('loginBtn').disabled = true;
      document.getElementById('signupBtn').disabled = true;
    }, 0);
  }

  // Already logged in? Skip to app
  client.auth.getSession().then(({ data: { session } }) => {

    if (session) {
      console.log("already logged in, going to index.html")
window.location.href = "index.html";
    } 
  });

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginTab').classList.toggle('active', isLogin);
    document.getElementById('signupTab').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('signupForm').classList.toggle('hidden', isLogin);
    clearMsg();
  }

  function setMsg(text, type = 'error') {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
  }
  function clearMsg() {
    const el = document.getElementById('message');
    el.textContent = '';
    el.className = 'message';
  }

  async function logIn() {
    if (!client) return;
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return setMsg("Please fill in all fields.");
    document.getElementById('loginBtn').disabled = true;
    const { error } = await client.auth.signInWithPassword({ email, password });
    document.getElementById('loginBtn').disabled = false;
    if (error) { setMsg(error.message); }
    else { setMsg("Logging in...", "success"); setTimeout(() => window.location.href = "index.html", 800); }
  }

  async function signUp() {
    if (!client) return;
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    if (!email || !password || !confirm) return setMsg("Please fill in all fields.");
    if (password.length < 6) return setMsg("Password must be at least 6 characters.");
    if (password !== confirm) return setMsg("Passwords don't match.");
    document.getElementById('signupBtn').disabled = true;
    const { error } = await client.auth.signUp({ email, password });
    document.getElementById('signupBtn').disabled = false;
    if (error) { setMsg(error.message); }
    else { setMsg("Account created! Check your email to confirm.", "success"); }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const isLogin = !document.getElementById('loginForm').classList.contains('hidden');
    isLogin ? logIn() : signUp();
  });
</script>
</body>
</html>

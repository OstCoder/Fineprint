<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        /* Center the container both vertically and horizontally */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Login container styling */
        .login-container {
            background-color: #764C34;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 300px; /* controls the width of everything inside */
            text-align: center;
        }

        /* Heading */
        h2 {
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* Input fields */
        input[type="text"], input[type="password"] {
            width: 100%; /* same width as container/button */
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box; /* ensures padding doesn't break width */
        }

        /* Login button */
        button {
            width: 100%; /* match the input fields */
            padding: 12px;
            margin-top: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Error message styling */
        .error {
            color: red;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="error" id="error"></div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            // Hardcoded credentials
            const correctUsername = "user";
            const correctPassword = "pass";

            if(username === correctUsername && password === correctPassword) {
                alert("Login successful!");
                // You can redirect to another page here
                // window.location.href = "homepage.html";
            } else {
                errorDiv.textContent = "Invalid username or password!";
            }
        }
    </script>
</body>
</html>
